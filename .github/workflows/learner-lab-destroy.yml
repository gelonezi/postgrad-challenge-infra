name: Learner Lab AWS - Terraform Destroy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    environment: aws

    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        working-directory: ./learner-lab
        shell: bash

    steps:
      # Checkout the repository to the GitHub Actions runner
      - name: Checkout
        uses: actions/checkout@v6

      # Install the latest version of Terraform CLI and configure the Terraform CLI configuration file with a Terraform Cloud user API token
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3

      # Configure AWS Credentials for AWS CLI and other AWS SDKs and tools
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
      - name: Terraform Init
        run: terraform init

      # Generates an execution plan for Terraform
      - name: Terraform Plan
        run: terraform plan -destroy -input=false
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

      # Cleanup orphan ENIs and network resources before destroying VPC
      - name: Cleanup Orphan Network Resources
        run: |
          echo "🔍 Checking for orphan network resources..."
          
          # Get VPC ID from Terraform state
          VPC_ID=$(terraform show -json | jq -r '.values.root_module.resources[] | select(.type == "aws_vpc") | .values.id' 2>/dev/null || echo "")
          
          if [ -z "$VPC_ID" ]; then
            echo "⚠️  VPC not found in state, skipping cleanup"
            exit 0
          fi
          
          echo "📍 VPC ID: $VPC_ID"
          
          # Step 1: Find and cleanup ALL ENIs in the VPC (not just Lambda)
          echo "🔍 Finding all ENIs in VPC..."
          ALL_ENIS=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query 'NetworkInterfaces[*].[NetworkInterfaceId,Description,Status]' \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$ALL_ENIS" ]; then
            ENI_COUNT=$(echo "$ALL_ENIS" | wc -l)
            echo "⚠️  Found $ENI_COUNT ENI(s) in VPC"
            echo "$ALL_ENIS"
            
            # Wait up to 10 minutes for AWS to clean them automatically
            TIMEOUT=600
            ELAPSED=0
            INTERVAL=30
            
            while [ $ELAPSED -lt $TIMEOUT ]; do
              REMAINING=$(aws ec2 describe-network-interfaces \
                --filters "Name=vpc-id,Values=$VPC_ID" \
                --query 'NetworkInterfaces[*].NetworkInterfaceId' \
                --output text 2>/dev/null || echo "")
              
              if [ -z "$REMAINING" ]; then
                echo "✅ All ENIs cleaned up!"
                break
              fi
              
              REMAINING_COUNT=$(echo $REMAINING | wc -w)
              echo "⏳ Waiting for cleanup... ($ELAPSED/$TIMEOUT seconds) - $REMAINING_COUNT ENI(s) remaining"
              
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done
            
            # After timeout, try to delete available ENIs manually
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "⚠️  Timeout reached. Attempting manual deletion..."
              
              ENI_IDS=$(echo "$ALL_ENIS" | awk '{print $1}')
              for ENI in $ENI_IDS; do
                STATUS=$(aws ec2 describe-network-interfaces \
                  --network-interface-ids $ENI \
                  --query 'NetworkInterfaces[0].Status' \
                  --output text 2>/dev/null || echo "not-found")
                
                if [ "$STATUS" = "available" ]; then
                  echo "🗑️  Deleting ENI $ENI..."
                  aws ec2 delete-network-interface --network-interface-id $ENI 2>/dev/null && \
                    echo "✅ Deleted" || echo "⚠️  Failed"
                elif [ "$STATUS" = "not-found" ]; then
                  echo "✅ ENI $ENI already deleted"
                else
                  echo "⏭️  ENI $ENI still $STATUS - skipping"
                fi
              done
            fi
          else
            echo "✅ No ENIs found in VPC"
          fi
          
          # Step 2: Detach Internet Gateway if exists
          echo "🔍 Checking for Internet Gateway..."
          IGW_ID=$(aws ec2 describe-internet-gateways \
            --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
            --query 'InternetGateways[0].InternetGatewayId' \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$IGW_ID" ] && [ "$IGW_ID" != "None" ]; then
            echo "📍 Found IGW: $IGW_ID"
            echo "🔌 Detaching Internet Gateway from VPC..."
            aws ec2 detach-internet-gateway --internet-gateway-id $IGW_ID --vpc-id $VPC_ID 2>/dev/null && \
              echo "✅ IGW detached" || echo "⚠️  Failed to detach IGW (may already be detached)"
            
            # Wait a bit for detachment to complete
            sleep 10
            
            echo "🗑️  Deleting Internet Gateway..."
            aws ec2 delete-internet-gateway --internet-gateway-id $IGW_ID 2>/dev/null && \
              echo "✅ IGW deleted" || echo "⚠️  Failed to delete IGW (will be handled by Terraform)"
          else
            echo "✅ No Internet Gateway attached"
          fi
          
          echo "✅ Network cleanup completed"
        continue-on-error: true

      # Destroy infrastructure according to Terraform configuration files
      - name: Terraform Destroy
        run: terraform apply -destroy -auto-approve -input=false
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

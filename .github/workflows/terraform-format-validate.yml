name: Terraform - Format & Validate

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - '**.tf'
      - '**.tfvars'
      - '**.hcl'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  format-and-validate:
    name: Format & Validate All Modules
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - aws
          - learner-lab
          - cognito
          - db
          - api-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3

      - name: Terraform Format Check - ${{ matrix.module }}
        id: fmt
        working-directory: ./${{ matrix.module }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init - ${{ matrix.module }}
        working-directory: ./${{ matrix.module }}
        run: terraform init -backend=false

      - name: Terraform Validate - ${{ matrix.module }}
        id: validate
        working-directory: ./${{ matrix.module }}
        run: terraform validate -no-color
        continue-on-error: true

      - name: Comment PR - ${{ matrix.module }}
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const module = '${{ matrix.module }}';
            const fmtOutcome = '${{ steps.fmt.outcome }}';
            const validateOutcome = '${{ steps.validate.outcome }}';
            
            let comment = `### Terraform Check Results - \`${module}/\`\n\n`;
            comment += `**Format Check:** ${fmtOutcome === 'success' ? '✅ Pass' : '❌ Fail'}\n`;
            comment += `**Validation:** ${validateOutcome === 'success' ? '✅ Pass' : '❌ Fail'}\n`;
            
            if (fmtOutcome === 'failure') {
              comment += `\n⚠️ **Action Required:** Run \`terraform fmt -recursive\` in \`${module}/\` directory.\n`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if Format or Validate Failed - ${{ matrix.module }}
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: |
          echo "::error::Terraform format or validation failed for module ${{ matrix.module }}"
          exit 1

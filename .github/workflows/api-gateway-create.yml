name: API Gateway - Terraform Create

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "hml"
        type: choice
        options:
          - hml
          - prd

permissions:
  contents: read

jobs:
  terraform:
    name: "Terraform Apply - API Gateway"
    runs-on: ubuntu-latest
    environment: aws

    defaults:
      run:
        working-directory: ./api-gateway
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Discover Infrastructure Values
        id: discover
        run: |
          echo "Discovering VPC ID..."
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=mechermes-vpc" \
            --query "Vpcs[0].VpcId" \
            --output text)
          echo "✓ VPC ID: $VPC_ID"

          echo "Discovering Private Subnets..."
          PRIVATE_SUBNETS_JSON=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=mechermes-vpc-private-*" \
            --query "Subnets[*].SubnetId" \
            --output json)
          echo "✓ Private Subnets: $PRIVATE_SUBNETS_JSON"

          echo "Discovering API Backend Security Group..."
          API_BACKEND_SG=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=mechermes-eks-node" \
            --query "SecurityGroups[0].GroupId" \
            --output text)
          echo "✓ API Backend SG: $API_BACKEND_SG"

          echo "Discovering Cognito User Pool ARN..."
          COGNITO_POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 \
            --query "UserPools[?Name=='mechermes-${{ inputs.environment }}-userpool'].Id | [0]" \
            --output text)
          COGNITO_ARN=$(aws cognito-idp describe-user-pool \
            --user-pool-id "$COGNITO_POOL_ID" \
            --query "UserPool.Arn" \
            --output text)
          echo "✓ Cognito ARN: $COGNITO_ARN"

          echo "Discovering Cognito App Client ID..."
          COGNITO_CLIENT_ID=$(aws cognito-idp list-user-pool-clients \
            --user-pool-id "$COGNITO_POOL_ID" \
            --query "UserPoolClients[0].ClientId" \
            --output text)
          echo "✓ Cognito Client ID: $COGNITO_CLIENT_ID"

          echo "Discovering Lambda Function ARN..."
          LAMBDA_ARN=$(aws lambda get-function \
            --function-name mechermes-${{ inputs.environment }}-cognito-token-lambda \
            --query "Configuration.FunctionArn" \
            --output text)
          echo "✓ Lambda ARN: $LAMBDA_ARN"

          echo "Discovering NLB Listener ARN for environment: ${{ inputs.environment }}..."
          
          # List all NLBs in the VPC for debugging
          echo "Available NLBs in VPC:"
          aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?VpcId=='${VPC_ID}' && Type=='network'].[LoadBalancerName,Scheme,LoadBalancerArn]" \
            --output table
          
          # Find NLB by looking for the Kubernetes service for the specific environment
          echo "Looking for NLB serving mecanica-hermes-api in namespace mecanica-hermes-${{ inputs.environment }}..."
          
          # Get all NLBs in the VPC
          NLB_ARNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?VpcId=='${VPC_ID}' && Type=='network'].LoadBalancerArn" \
            --output text)
          
          NLB_LISTENER_ARN=""
          for NLB_ARN in $NLB_ARNS; do
            echo "Checking NLB: $NLB_ARN"
            
            # Get target groups for this NLB
            TARGET_GROUPS=$(aws elbv2 describe-target-groups \
              --load-balancer-arn "$NLB_ARN" \
              --query "TargetGroups[*].[TargetGroupName,Port]" \
              --output text)
            
            echo "  Target groups: $TARGET_GROUPS"
            
            # Check if this NLB has a target group matching the environment
            # HML uses port 32430, PRD uses port 32040 (these are NodePort assignments from K8s)
            if echo "$TARGET_GROUPS" | grep -q "mecanica"; then
              echo "  ✓ Found NLB for mecanica-hermes-api"
              
              # Get listener ARN for port 80
              LISTENER_ARN=$(aws elbv2 describe-listeners \
                --load-balancer-arn "$NLB_ARN" \
                --query "Listeners[?Port==\`80\`] | [0].ListenerArn" \
                --output text)
              
              if [ "$LISTENER_ARN" != "None" ] && [ -n "$LISTENER_ARN" ]; then
                # Verify this is the correct environment by checking target health
                TARGET_GROUP_ARN=$(aws elbv2 describe-target-groups \
                  --load-balancer-arn "$NLB_ARN" \
                  --query "TargetGroups[0].TargetGroupArn" \
                  --output text)
                
                TARGET_PORT=$(aws elbv2 describe-target-groups \
                  --load-balancer-arn "$NLB_ARN" \
                  --query "TargetGroups[0].Port" \
                  --output text)
                
                echo "  Target Port: $TARGET_PORT"
                
                # Assign based on known ports: HML=32430, PRD=32040
                if [ "${{ inputs.environment }}" == "hml" ] && [ "$TARGET_PORT" == "32430" ]; then
                  NLB_LISTENER_ARN="$LISTENER_ARN"
                  echo "  ✓ Matched HML environment (port 32430)"
                  break
                elif [ "${{ inputs.environment }}" == "prd" ] && [ "$TARGET_PORT" == "32040" ]; then
                  NLB_LISTENER_ARN="$LISTENER_ARN"
                  echo "  ✓ Matched PRD environment (port 32040)"
                  break
                fi
              fi
            fi
          done
          
          if [ -z "$NLB_LISTENER_ARN" ] || [ "$NLB_LISTENER_ARN" == "None" ]; then
            echo "❌ ERROR: No Network Load Balancer found for environment ${{ inputs.environment }}"
            echo "Expected port: HML=32430, PRD=32040"
            exit 1
          fi
          
          echo "✓ NLB Listener ARN: $NLB_LISTENER_ARN"

          echo "Generating terraform.tfvars..."
          cat > terraform.tfvars <<EOF
          project_name          = "mechermes"
          environment           = "${{ inputs.environment }}"
          cognito_user_pool_arn = "${COGNITO_ARN}"
          cognito_app_client_id = "${COGNITO_CLIENT_ID}"
          lambda_function_arn   = "${LAMBDA_ARN}"
          lambda_function_name  = "mechermes-${{ inputs.environment }}-cognito-token-lambda"
          vpc_id                = "${VPC_ID}"
          private_subnets       = ${PRIVATE_SUBNETS_JSON}
          api_backend_sg_id     = "${API_BACKEND_SG}"
          nlb_listener_arn      = "${NLB_LISTENER_ARN}"
          nlb_target_port       = 80
          EOF
          echo "✓ terraform.tfvars generated"
          cat terraform.tfvars

      - name: Terraform Init
        run: terraform init -backend-config=backend-${{ inputs.environment }}.hcl

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        id: output
        run: |
          API_GATEWAY_URL=$(terraform output -raw stage_invoke_url)
          echo "API_GATEWAY_URL=$API_GATEWAY_URL" >> $GITHUB_OUTPUT
          echo "✓ API Gateway URL: $API_GATEWAY_URL"

      - name: Summary
        run: |
          echo "## API Gateway - Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ API Gateway deployed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Endpoint URL" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.output.outputs.API_GATEWAY_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available Routes" >> $GITHUB_STEP_SUMMARY
          echo "- \`POST /auth/generate-token\` - Generate Cognito token (no auth)" >> $GITHUB_STEP_SUMMARY
          echo "- \`ANY /{proxy+}\` - API Backend (JWT required)" >> $GITHUB_STEP_SUMMARY
          echo "- \`GET /health\` - Health check (no auth)" >> $GITHUB_STEP_SUMMARY
          echo "- \`GET /healthz/live\` - Liveness probe (no auth)" >> $GITHUB_STEP_SUMMARY
          echo "- \`GET /healthz/ready\` - Readiness probe (no auth)" >> $GITHUB_STEP_SUMMARY

name: Database - Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "hml"
        type: choice
        options:
          - hml
          - prd

permissions:
  contents: read

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    environment: aws
    env:
      ENVIRONMENT: ${{ inputs.environment || vars.environment }}

    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        working-directory: ./db
        shell: bash

    steps:
      # Checkout the repository to the GitHub Actions runner
      - name: Checkout
        uses: actions/checkout@v6

      # Install the latest version of Terraform CLI and configure the Terraform CLI configuration file with a Terraform Cloud user API token
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3

      # Configure AWS Credentials for AWS CLI and other AWS SDKs and tools
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
      - name: Terraform Init
        run: terraform init "-backend-config=backend-${{ env.ENVIRONMENT }}.hcl"

      # Generates an execution plan for Terraform
      - name: Terraform Plan
        run: terraform plan -destroy -input=false -var="environment=${{ env.ENVIRONMENT }}"

      # Destroy infrastructure according to Terraform configuration files
      - name: Terraform Destroy
        run: terraform apply -destroy -auto-approve -input=false -var="environment=${{ env.ENVIRONMENT }}"

name: API Gateway - Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "hml"
        type: choice
        options:
          - hml
          - prd

permissions:
  contents: read

jobs:
  terraform:
    name: "Terraform Destroy - API Gateway"
    runs-on: ubuntu-latest
    environment: aws

    defaults:
      run:
        working-directory: ./api-gateway
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Discover Infrastructure Values
        run: |
          echo "Discovering VPC ID..."
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=mechermes-vpc" \
            --query "Vpcs[0].VpcId" \
            --output text)
          echo "✓ VPC ID: $VPC_ID"

          echo "Discovering Private Subnets..."
          PRIVATE_SUBNETS_JSON=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=mechermes-vpc-private-*" \
            --query "Subnets[*].SubnetId" \
            --output json)
          echo "✓ Private Subnets: $PRIVATE_SUBNETS_JSON"

          echo "Discovering API Backend Security Group..."
          API_BACKEND_SG=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=mechermes-eks-node" \
            --query "SecurityGroups[0].GroupId" \
            --output text)
          echo "✓ API Backend SG: $API_BACKEND_SG"

          echo "Discovering Cognito User Pool ARN..."
          COGNITO_POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 \
            --query "UserPools[?Name=='mechermes-${{ inputs.environment }}-userpool'].Id | [0]" \
            --output text)
          COGNITO_ARN=$(aws cognito-idp describe-user-pool \
            --user-pool-id "$COGNITO_POOL_ID" \
            --query "UserPool.Arn" \
            --output text)
          echo "✓ Cognito ARN: $COGNITO_ARN"

          echo "Discovering Cognito App Client ID..."
          COGNITO_CLIENT_ID=$(aws cognito-idp list-user-pool-clients \
            --user-pool-id "$COGNITO_POOL_ID" \
            --query "UserPoolClients[0].ClientId" \
            --output text)
          echo "✓ Cognito Client ID: $COGNITO_CLIENT_ID"

          echo "Discovering Lambda Function ARN..."
          LAMBDA_ARN=$(aws lambda get-function \
            --function-name mechermes-${{ inputs.environment }}-cognito-token-lambda \
            --query "Configuration.FunctionArn" \
            --output text)
          echo "✓ Lambda ARN: $LAMBDA_ARN"

          echo "Discovering NLB Listener ARN..."
          # First, list all NLBs in the VPC for debugging
          echo "Available NLBs in VPC:"
          aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?VpcId=='${VPC_ID}' && Type=='network'].[LoadBalancerName,Scheme,LoadBalancerArn]" \
            --output table
          
          # Try to find internal NLB first, then fall back to any network LB
          NLB_ARN=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?VpcId=='${VPC_ID}' && Type=='network' && Scheme=='internal'] | [0].LoadBalancerArn" \
            --output text)
          
          if [ "$NLB_ARN" == "None" ] || [ -z "$NLB_ARN" ]; then
            echo "⚠ No internal NLB found, trying any network load balancer..."
            NLB_ARN=$(aws elbv2 describe-load-balancers \
              --query "LoadBalancers[?VpcId=='${VPC_ID}' && Type=='network'] | [0].LoadBalancerArn" \
              --output text)
          fi
          
          if [ "$NLB_ARN" == "None" ] || [ -z "$NLB_ARN" ]; then
            echo "❌ ERROR: No Network Load Balancer found in VPC ${VPC_ID}"
            exit 1
          fi
          
          echo "✓ NLB ARN: $NLB_ARN"
          
          NLB_LISTENER_ARN=$(aws elbv2 describe-listeners \
            --load-balancer-arn "$NLB_ARN" \
            --query "Listeners[?Port==\`80\`] | [0].ListenerArn" \
            --output text)
          
          if [ "$NLB_LISTENER_ARN" == "None" ] || [ -z "$NLB_LISTENER_ARN" ]; then
            echo "❌ ERROR: No listener on port 80 found for NLB"
            echo "Available listeners:"
            aws elbv2 describe-listeners --load-balancer-arn "$NLB_ARN" --query "Listeners[*].[Port,Protocol]" --output table
            exit 1
          fi
          
          echo "✓ NLB Listener ARN: $NLB_LISTENER_ARN"

          echo "Generating terraform.tfvars..."
          cat > terraform.tfvars <<EOF
          project_name          = "mechermes"
          environment           = "${{ inputs.environment }}"
          cognito_user_pool_arn = "${COGNITO_ARN}"
          cognito_app_client_id = "${COGNITO_CLIENT_ID}"
          lambda_function_arn   = "${LAMBDA_ARN}"
          lambda_function_name  = "mechermes-${{ inputs.environment }}-cognito-token-lambda"
          vpc_id                = "${VPC_ID}"
          private_subnets       = ${PRIVATE_SUBNETS_JSON}
          api_backend_sg_id     = "${API_BACKEND_SG}"
          nlb_listener_arn      = "${NLB_LISTENER_ARN}"
          nlb_target_port       = 80
          EOF
          echo "✓ terraform.tfvars generated"
          cat terraform.tfvars

      - name: Terraform Init
        run: terraform init -backend-config=backend-${{ inputs.environment }}.hcl

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Summary
        run: |
          echo "## API Gateway - Destruction Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ API Gateway destroyed successfully!" >> $GITHUB_STEP_SUMMARY
